<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container container--home">
      <section class="card">
        <div class="card-topbar">
          <button class="secondary theme-toggle" type="button" id="themeToggleBtn">Tema claro</button>
        </div>
        <h1>Login</h1>
        <p>Entre com seu email e senha.</p>

        <section class="login-libras-block" aria-labelledby="loginLibrasTitle">
          <h2 id="loginLibrasTitle" class="home-video-heading">Como fazer login (Libras)</h2>
          <p class="home-video-note">
            Vídeo em Língua Brasileira de Sinais com orientações para acessar o sistema.
          </p>
          <video class="home-video login-libras-video" controls preload="metadata" playsinline>
            <source src="Video2.mp4" type="video/mp4" />
            Seu navegador não suporta vídeo HTML5.
          </video>
        </section>

        <form id="loginForm">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" maxlength="30" required />

          <label for="senha">Senha</label>
          <input id="senha" type="password" autocomplete="current-password" minlength="6" required />

          <div class="row">
            <button type="submit">Entrar</button>
          </div>

          <div id="message" class="message"></div>
        </form>

        <a class="link" href="register.html">Não tem conta? Cadastre-se</a>
      </section>
    </main>
    <footer class="footer-note">
      Feito por Joao Luiz, apenas um prototipo para o projeto PIM IV.
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
